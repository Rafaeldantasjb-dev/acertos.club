    <script>
        const splashScreen = document.getElementById('splash-screen');
        const splashLogo = document.getElementById('splash-logo');
        const errorContainer = document.getElementById('error-container');
        const iframeContainer = document.getElementById('iframe-container');
        const mainIframe = document.getElementById('main-iframe');
        const targetUrl = "https://app.acertos.club/pr/fC7hpda9";

        let iframeLoaded = false;

        function hideSplash() {
            if (!iframeLoaded) {
                iframeLoaded = true;
                splashScreen.classList.add('hidden');
                iframeContainer.classList.add('visible');
            }
        }

        // Carregamento assíncrono e seguro do iframe
        window.addEventListener('load', () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').then(reg => { reg.update(); }).catch(() => {});
            }
            
            // Dispara a requisição do iframe logo após a main thread aliviar
            setTimeout(() => {
                mainIframe.src = targetUrl;
            }, 50);
        });

        // Oculta o splash se o iframe responder com sucesso
        mainIframe.addEventListener('load', hideSplash);
        
        // CONTROLE DE TIMEOUT (6 segundos)
        // Se a aplicação principal falhar ou a conexão falhar, exibe o botão amigável de reload
        setTimeout(() => {
            if (!iframeLoaded) {
                if (splashLogo) splashLogo.style.display = 'none';
                errorContainer.style.display = 'block';
            }
        }, 6000);
