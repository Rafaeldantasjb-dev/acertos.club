    <style>
        /* CSS Otimizado */
        :root {
            --bg-color: #000;
            --text-color: #222222;
            --primary-color: #002b1b;
            --primary-hover: #001a10;
            --secondary-color: #00d176;
            --secondary-hover: #00c06a;
            --splash-bg: #00bb6a;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-color);
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-text-size-adjust: 100%;
            content-visibility: auto;
        }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--splash-bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; opacity: 1;
            transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
        }

        #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .splash-icon {
            width: 120px; height: 120px;
            will-change: transform, opacity;
            animation: fadeInScale 0.6s ease-out forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        #iframe-container { width: 100%; height: 100%; opacity: 0; transition: opacity 0.4s ease; }
        #iframe-container.visible { opacity: 1; }

        iframe {
            width: 100%; height: 100%; border: none; display: block;
            background-color: var(--bg-color); color-scheme: dark;
        }
    </style>
</head>

    <script>
        const splashScreen = document.getElementById('splash-screen');
        const splashLogo = document.getElementById('splash-logo');
        const errorContainer = document.getElementById('error-container');
        const iframeContainer = document.getElementById('iframe-container');
        const mainIframe = document.getElementById('main-iframe');
        const targetUrl = "https://app.acertos.club/pr/fC7hpda9";

        let iframeLoaded = false;

        function hideSplash() {
            if (!iframeLoaded) {
                iframeLoaded = true;
                splashScreen.classList.add('hidden');
                iframeContainer.classList.add('visible');
            }
        }

        // Carregamento assíncrono e seguro do iframe
        window.addEventListener('load', () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            }
            
            // Dispara a requisição do iframe logo após a main thread aliviar
            setTimeout(() => {
                mainIframe.src = targetUrl;
            }, 50);
        });

        // Oculta o splash se o iframe responder com sucesso
        mainIframe.addEventListener('load', hideSplash);
        
        // CONTROLE DE TIMEOUT (6 segundos)
        // Se a aplicação principal falhar ou a conexão falhar, exibe o botão amigável de reload
        setTimeout(() => {
            if (!iframeLoaded) {
                if (splashLogo) splashLogo.style.display = 'none';
                errorContainer.style.display = 'block';
            }
        }, 6000);
    </script>
