    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS Otimizado - Apenas o necessário para o primeiro carregamento */
        :root {
            --bg-color: #000;
            --text-color: #222222;
            --primary-color: #002b1b;
            --primary-hover: #001a10;
            --secondary-color: #00d176;
            --secondary-hover: #00c06a;
            --splash-bg: #00bb6a;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-color);
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-text-size-adjust: 100%;
            content-visibility: auto;
        }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--splash-bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; opacity: 1;
            transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
        }

        #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .splash-icon {
            width: 120px; height: 120px;
            will-change: transform, opacity;
            animation: fadeInScale 0.6s ease-out forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        #iframe-container { width: 100%; height: 100%; opacity: 0; transition: opacity 0.4s ease; }
        #iframe-container.visible { opacity: 1; }

        iframe {
            width: 100%; height: 100%; border: none; display: block;
            background-color: var(--bg-color); color-scheme: dark;
        }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border-width: 0; }
    </style>
</head>
<body>

    <article class="sr-only">
        <h1>77X BRASIL - Apostas Online e Jogo do Bicho</h1>
        <p>Aposte na 77x Brasil com 30% de Bônus. Jogo do Bicho e Cassino seguro.</p>
    </article>

    <div id="splash-screen">
        <!-- Atribuindo fetchpriority alta para a imagem de splash (LCP) -->
        <img src="/Assets/splashscreen.webp" alt="77X Brasil" class="splash-icon" fetchpriority="high">
    </div>

    <main id="iframe-container">
        <iframe 
            id="main-iframe"
            title="Plataforma de Apostas 77x Brasil"
            allow="clipboard-read; clipboard-write; camera; microphone; geolocation; display-capture; fullscreen"
            allowfullscreen>
        </iframe>
            <div id="manus-palpites-component" data-payload='{}'></div>
    </main>
    <script>
        // Otimização de carregamento: Adia scripts não essenciais
        const splashScreen = document.getElementById('splash-screen');
        const iframeContainer = document.getElementById('iframe-container');
        const mainIframe = document.getElementById('main-iframe');
        const targetUrl = "https://app.sorteclub.com/pr/xpBkJtSK";

        let splashHidden = false;
        function hideSplash() {
            if (!splashHidden) {
                splashHidden = true;
                splashScreen.classList.add('hidden');
                iframeContainer.classList.add('visible');
            }
        }

        // Carregamento assíncrono do iframe
        window.addEventListener('load', () => {
            // Prioridade para o Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            }
            
            // Carrega iframe após o carregamento da página principal
            setTimeout(() => {
                mainIframe.src = targetUrl;
            }, 100);
        });

        mainIframe.addEventListener('load', hideSplash);
        
        // Fallback mais agressivo para UX
        setTimeout(hideSplash, 2500);
    </script>
    <script src="script.js"></script>
</body>
